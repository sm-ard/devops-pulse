name: Daily Pulse
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}     # manual trigger for testing

concurrency:
  group: daily-pulse
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Generate pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pulse.main
      - name: Commit as owner
        run: |
          git config user.name "sm-ard"
          git config user.email "satishkumar.marada@gmail.com"
          git add reports/ README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: pulse $(date -u +%F)"
            git push
          fi
